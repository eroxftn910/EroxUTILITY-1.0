name: Build EroxUTILITY

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish
      run: dotnet publish EroxUTILITY.csproj -c Release -r win-x64 --self-contained true

    - name: Upload App
      uses: actions/upload-artifact@v4
      with:
        name: EroxUTILITY
        path: bin/Release/net8.0-windows/win-x64/publish/
